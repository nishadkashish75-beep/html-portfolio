<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Timetable</title>
</head>

<body>

    <table border="3px solid black" cellpadding="15">

        <thead bgcolor="black">

            <th style="color:white;"> </th>
            <th style="color:white;">Monday</th>
            <th style="color:white;">Tuesday</th>
            <th style="color:white;">Wednesday</th>
            <th style="color:white;">Thursday</th>
            <th style="color:white;">Friday</th>

        </thead>

        <tbody align="center">

            <tr>

                <td bgcolor="lightgray">1:00</td>

                <td rowspan="2" bgcolor="skyblue">Office</td>

                <td></td>

                <td rowspan="2" bgcolor="skyblue">Office</td>

                <td rowspan="9" bgcolor="gold">
                    Office Hours By Appt
                </td>

                <td rowspan="2" bgcolor="skyblue">Office</td>

            </tr>

            <tr>

                <td bgcolor="lightgray">1:30</td>

                <td rowspan="2" bgcolor="pink">
                    Dept Meeting
                </td>

            </tr>

            <tr>

                <td bgcolor="lightgray">2:00</td>

                <td rowspan="3" bgcolor="lightgreen">
                    MAT108
                </td>

                <td rowspan="3" bgcolor="lightgreen">
                    MAT108
                </td>

                <td rowspan="3" bgcolor="lightgreen">
                    MAT108
                </td>

            </tr>

            <tr>

                <td bgcolor="lightgray">2:30</td>

            </tr>

            <tr>

                <td bgcolor="lightgray">3:00</td>

                <td rowspan="3" bgcolor="orange">
                    EC Meeting
                </td>

            </tr>

            <tr>

                <td bgcolor="lightgray">3:30</td>

                <td rowspan="3" bgcolor="plum">
                    CSC 205
                </td>

                <td rowspan="3" bgcolor="plum">
                    CSC 205
                </td>

                <td rowspan="3" bgcolor="plum">
                    CSC 205
                </td>

            </tr>

            <tr>

                <td bgcolor="lightgray">4:00</td>

            </tr>

            <tr>

                <td bgcolor="lightgray">4:30</td>

                <td></td>

            </tr>

        </tbody>

    </table>

</body>

</html>
